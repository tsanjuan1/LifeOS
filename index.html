<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LifeOS</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0c0c0f;--surface:#13131a;--surface2:#1a1a24;--border:#2a2a3a;--border2:#3a3a50;
  --accent:#7c6af5;--accent-lo:rgba(124,106,245,0.12);
  --gold:#f5a623;--gold-lo:rgba(245,166,35,0.12);
  --green:#2dd4a0;--green-lo:rgba(45,212,160,0.12);
  --red:#f56c6c;--red-lo:rgba(245,108,108,0.12);
  --blue:#60a5fa;--blue-lo:rgba(96,165,250,0.12);
  --text:#e8e8f0;--muted:#7a7a9a;--dim:#4a4a6a;
  --r:10px;--rs:6px;--rl:14px;
  --font:'Syne',sans-serif;--mono:'DM Mono',monospace;
}
html{font-size:15px}
body{background:var(--bg);color:var(--text);font-family:var(--font);-webkit-font-smoothing:antialiased;min-height:100vh;line-height:1.5}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
button{cursor:pointer;font-family:var(--font)}
input,textarea,select{font-family:var(--font)}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes modalIn{from{opacity:0;transform:translateY(16px) scale(0.98)}to{opacity:1;transform:translateY(0) scale(1)}}
.spin{animation:spin 1s linear infinite}
.fade{animation:fadeIn 0.3s ease}

/* SIDEBAR */
.sidebar{width:220px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:100}
.logo{padding:22px 20px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.logo-icon{width:32px;height:32px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px}
.logo-text{font-weight:800;font-size:18px;letter-spacing:-0.02em}
.nav-section{padding:14px 12px 8px}
.nav-btn{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--rs);margin-bottom:2px;font-size:14px;font-weight:500;color:var(--muted);background:transparent;border:1px solid transparent;width:100%;text-align:left;transition:all 0.15s;cursor:pointer}
.nav-btn:hover{color:var(--text);background:var(--surface2)}
.nav-btn.active{color:var(--text);background:var(--surface2);border-color:var(--border)}
.nav-btn.active .nav-icon{color:var(--accent)}
.nav-icon{font-size:16px;width:18px;text-align:center}
.sidebar-footer{padding:14px;border-top:1px solid var(--border);margin-top:auto}
.quick-btn{width:100%;padding:10px;background:var(--accent-lo);border:1px solid rgba(124,106,245,0.3);border-radius:var(--rs);color:var(--accent);font-weight:700;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;transition:all 0.15s;margin-bottom:10px}
.quick-btn:hover{background:var(--accent);color:#fff}
.signout-btn{width:100%;padding:8px 12px;background:none;border:1px solid var(--border);border-radius:var(--rs);color:var(--muted);font-size:13px;cursor:pointer;display:flex;align-items:center;gap:8px;transition:all 0.15s}
.signout-btn:hover{color:var(--red);border-color:var(--red)}

/* MAIN */
.main{margin-left:220px;min-height:100vh;background:var(--bg)}
.page{max-width:960px;margin:0 auto;padding:32px}
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px}

/* LABEL */
.label{font-family:var(--mono);font-size:10px;letter-spacing:0.2em;text-transform:uppercase;color:var(--dim)}
.page-title{font-size:26px;font-weight:800;letter-spacing:-0.02em;margin-top:4px}

/* CARD */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:20px;transition:border-color 0.15s}
.card:hover{border-color:var(--border2)}
.card-flush{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}

/* BUTTON */
.btn{display:inline-flex;align-items:center;gap:6px;font-family:var(--font);font-weight:600;border:1px solid transparent;border-radius:var(--rs);cursor:pointer;transition:all 0.15s;font-size:13px;padding:8px 16px;white-space:nowrap}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-primary:hover{opacity:0.88}
.btn-ghost{background:transparent;color:var(--muted);border-color:transparent}
.btn-ghost:hover{color:var(--text);background:var(--surface2)}
.btn-outline{background:transparent;color:var(--text);border-color:var(--border)}
.btn-outline:hover{border-color:var(--border2)}
.btn-danger{background:var(--red-lo);color:var(--red);border-color:rgba(245,108,108,0.3)}
.btn-danger:hover{background:var(--red);color:#fff}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-icon{padding:5px;background:none;border:1px solid var(--border);border-radius:var(--rs);color:var(--muted);cursor:pointer;display:inline-flex;align-items:center;justify-content:center;transition:all 0.15s}
.btn-icon:hover{border-color:var(--border2);color:var(--text)}
.btn-icon.danger:hover{border-color:var(--red);color:var(--red)}
.btn:disabled{opacity:0.5;cursor:not-allowed}

/* FORM */
.form-group{display:flex;flex-direction:column;gap:6px}
.form-label{font-family:var(--mono);font-size:11px;letter-spacing:0.05em;color:var(--muted)}
.input{background:var(--surface2);border:1px solid var(--border);border-radius:var(--rs);padding:8px 12px;color:var(--text);font-size:14px;width:100%;outline:none;transition:border-color 0.15s;font-family:var(--font)}
.input:focus{border-color:var(--accent)}
textarea.input{resize:vertical;min-height:80px;line-height:1.5}
select.input{cursor:pointer}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.75);backdrop-filter:blur(4px);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);width:100%;max-width:480px;box-shadow:0 8px 40px rgba(0,0,0,0.6);animation:modalIn 0.2s ease}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:18px 22px;border-bottom:1px solid var(--border)}
.modal-title{font-size:16px;font-weight:700}
.modal-body{padding:22px}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:18px}
.modal-wide{max-width:560px}

/* TAGS */
.tag{display:inline-block;font-family:var(--mono);font-size:10px;padding:2px 7px;border-radius:4px;border:1px solid;white-space:nowrap}
.tag-purple{color:var(--accent);border-color:rgba(124,106,245,0.3);background:var(--accent-lo)}
.tag-gold{color:var(--gold);border-color:rgba(245,166,35,0.3);background:var(--gold-lo)}
.tag-green{color:var(--green);border-color:rgba(45,212,160,0.3);background:var(--green-lo)}
.tag-red{color:var(--red);border-color:rgba(245,108,108,0.3);background:var(--red-lo)}
.tag-blue{color:var(--blue);border-color:rgba(96,165,250,0.3);background:var(--blue-lo)}

/* PROGRESS */
.progress-wrap{height:5px;background:var(--border);border-radius:3px;overflow:hidden}
.progress-bar{height:100%;border-radius:3px;transition:width 0.4s ease}

/* TABS */
.tabs{display:flex;gap:4px;background:var(--surface);padding:4px;border-radius:var(--r);border:1px solid var(--border);width:fit-content;margin-bottom:18px}
.tab{padding:6px 18px;border-radius:var(--rs);border:none;font-size:13px;font-weight:600;cursor:pointer;transition:all 0.15s;font-family:var(--font)}
.tab.active{background:var(--surface2);color:var(--text)}
.tab:not(.active){background:transparent;color:var(--muted)}

/* STATS GRID */
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:22px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px 18px}
.stat-value{font-size:26px;font-weight:800;margin:6px 0 2px}
.stat-sub{font-family:var(--mono);font-size:11px;color:var(--muted)}

/* LIST ROWS */
.list-row{display:flex;align-items:center;gap:12px;padding:14px 18px;border-bottom:1px solid var(--border);transition:background 0.12s}
.list-row:last-child{border-bottom:none}
.list-row:hover{background:var(--surface2)}

/* EMPTY STATE */
.empty{text-align:center;padding:52px 24px;color:var(--muted)}
.empty-icon{font-size:40px;margin-bottom:12px}
.empty-title{font-size:16px;font-weight:700;color:var(--text);margin-bottom:6px}
.empty-desc{font-size:14px;margin-bottom:18px}

/* ALERT */
.alert{display:flex;align-items:flex-start;gap:12px;padding:12px 16px;border-radius:var(--r);border:1px solid;margin-bottom:20px;font-size:13px}
.alert-gold{background:var(--gold-lo);border-color:rgba(245,166,35,0.3);color:var(--text)}
.alert-red{background:var(--red-lo);border-color:rgba(245,108,108,0.3);color:var(--text)}
.alert-green{background:var(--green-lo);border-color:rgba(45,212,160,0.3);color:var(--text)}

/* SPINNER */
.spinner-wrap{display:flex;align-items:center;justify-content:center;padding:52px}
.spinner{width:24px;height:24px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite}

/* AUTH PAGE */
.auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px;background:var(--bg);position:relative}
.auth-bg{position:fixed;inset:0;pointer-events:none;background:radial-gradient(ellipse 70% 50% at 50% 0%,rgba(124,106,245,0.14),transparent)}
.auth-box{width:100%;max-width:400px;position:relative;z-index:1}
.auth-logo{text-align:center;margin-bottom:36px}
.auth-logo-icon{width:52px;height:52px;background:var(--accent);border-radius:14px;display:inline-flex;align-items:center;justify-content:center;font-size:24px;margin-bottom:14px}
.auth-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:30px;box-shadow:0 8px 40px rgba(0,0,0,0.5)}
.auth-form{display:flex;flex-direction:column;gap:14px}

/* LOADING SCREEN */
.loading-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);flex-direction:column;gap:16px}

/* HOY specific */
.brief-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:22px}
.habit-check{width:24px;height:24px;border-radius:50%;border:2px solid var(--border);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.2s}
.habit-check.done{border-color:var(--green);background:var(--green)}
.task-check{width:18px;height:18px;border-radius:50%;border:2px solid var(--border);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.2s}
.task-check:hover{border-color:var(--green)}

/* NOTES GRID */
.notes-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px}
.note-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px;cursor:pointer;transition:border-color 0.15s;display:flex;flex-direction:column;gap:8px}
.note-card:hover{border-color:var(--accent)}

/* GOALS GRID */
.goals-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}

/* EMOJI PICKER */
.emoji-grid{display:flex;flex-wrap:wrap;gap:6px}
.emoji-btn{width:36px;height:36px;font-size:20px;border-radius:var(--rs);cursor:pointer;border:2px solid var(--border);background:var(--surface2);transition:all 0.15s}
.emoji-btn.selected{border-color:var(--accent);background:var(--accent-lo)}

/* MONTH INPUT */
input[type=month]{background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);padding:8px 12px;color:var(--text);font-size:13px;font-family:var(--font);outline:none;cursor:pointer}
input[type=month]:focus{border-color:var(--accent)}
input[type=date]{color-scheme:dark}
input[type=month]{color-scheme:dark}
input[type=number]{-moz-appearance:textfield}
input[type=number]::-webkit-outer-spin-button,input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}

/* STREAK BADGE */
.streak{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;background:var(--gold-lo);border:1px solid rgba(245,166,35,0.3);border-radius:var(--rs);font-family:var(--mono);font-size:12px;color:var(--gold);font-weight:600}

/* CONFIG SCREEN */
.config-row{display:flex;align-items:center;justify-content:space-between;padding:14px 0;border-bottom:1px solid var(--border)}
.config-row:last-child{border-bottom:none}

@media(max-width:700px){
  .sidebar{width:60px}
  .logo-text,.nav-label,.quick-btn span,.signout-btn span{display:none}
  .main{margin-left:60px}
  .logo{padding:16px 14px}
  .nav-section{padding:10px 8px}
  .nav-btn{padding:10px;justify-content:center}
  .stats-grid{grid-template-columns:1fr 1fr}
  .brief-grid{grid-template-columns:1fr}
  .page{padding:20px 16px}
}
</style>
</head>
<body>
<div id="root"></div>
<script>
const { useState, useEffect, useCallback, useRef, createContext, useContext } = React;
const { createClient } = supabase;

// ─── CONFIG ──────────────────────────────────────────────────────────────────
// IMPORTANTE: Reemplaza estos valores con los de tu proyecto Supabase
// Los encuentras en: Supabase → Project Settings → API
const SUPABASE_URL = 'https://TU_PROYECTO.supabase.co';
const SUPABASE_KEY = 'TU_ANON_KEY_AQUI';

// ─── SUPABASE CLIENT ─────────────────────────────────────────────────────────
let sb;
try {
  sb = createClient(SUPABASE_URL, SUPABASE_KEY);
} catch(e) {
  sb = null;
}

// ─── HELPERS ─────────────────────────────────────────────────────────────────
const fmt = (d) => new Date(d).toLocaleDateString('es-ES',{day:'2-digit',month:'2-digit',year:'numeric'});
const fmtMoney = (n) => `€${Number(n||0).toFixed(2)}`;
const today = () => new Date().toISOString().split('T')[0];
const thisMonth = () => new Date().toISOString().slice(0,7);
const monthStart = (m) => m + '-01';
const monthEnd = (m) => { const d = new Date(m+'-01'); d.setMonth(d.getMonth()+1); d.setDate(0); return d.toISOString().split('T')[0]; };
const todayName = () => {
  const d = new Date();
  return d.toLocaleDateString('es-ES',{weekday:'long',day:'numeric',month:'long'}).replace(/^\w/,c=>c.toUpperCase());
};

// ─── CONTEXT ─────────────────────────────────────────────────────────────────
const AppCtx = createContext(null);
const useApp = () => useContext(AppCtx);

// ─── ICONS (SVG inline) ──────────────────────────────────────────────────────
const Icon = {
  home: `<path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>`,
  check: `<polyline points="20 6 9 17 4 12"/>`,
  dollar: `<line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/>`,
  target: `<circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/>`,
  note: `<path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/>`,
  plus: `<line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>`,
  logout: `<path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>`,
  x: `<line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>`,
  trash: `<polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/>`,
  edit: `<path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/>`,
  flame: `<path d="M8.5 14.5A2.5 2.5 0 0011 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 11-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 002.5 3z"/>`,
  alert: `<path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>`,
  search: `<circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>`,
  pin: `<line x1="12" y1="17" x2="12" y2="22"/><path d="M5 17h14v-1.76a2 2 0 00-1.11-1.79l-1.78-.9A2 2 0 0115 10.76V6h1a2 2 0 000-4H8a2 2 0 000 4h1v4.76a2 2 0 01-1.11 1.79l-1.78.9A2 2 0 005 15.24V17z"/>`,
  arrow: `<line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/>`,
  settings: `<circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/>`,
  circle: `<circle cx="12" cy="12" r="10"/>`,
  zap: `<polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>`,
};

const Svg = ({ icon, size=16, color='currentColor', style={} }) =>
  React.createElement('svg', {
    width: size, height: size, viewBox: '0 0 24 24', fill: 'none',
    stroke: color, strokeWidth: 2, strokeLinecap: 'round', strokeLinejoin: 'round',
    style, dangerouslySetInnerHTML: { __html: Icon[icon] }
  });

// ─── UI COMPONENTS ────────────────────────────────────────────────────────────
const Spinner = () => React.createElement('div', { className: 'spinner-wrap' },
  React.createElement('div', { className: 'spinner' })
);

const ProgressBar = ({ value, max=100, color }) => {
  const pct = Math.min(100, max > 0 ? Math.round((value/max)*100) : 0);
  const c = pct >= 90 ? 'var(--red)' : pct >= 70 ? 'var(--gold)' : (color || 'var(--accent)');
  return React.createElement('div', { className: 'progress-wrap' },
    React.createElement('div', { className: 'progress-bar', style: { width: pct+'%', background: c } })
  );
};

const Tag = ({ children, color='purple' }) =>
  React.createElement('span', { className: `tag tag-${color}` }, children);

const Empty = ({ icon, title, desc, onAction, actionLabel }) =>
  React.createElement('div', { className: 'empty' },
    React.createElement('div', { className: 'empty-icon' }, icon),
    React.createElement('div', { className: 'empty-title' }, title),
    React.createElement('div', { className: 'empty-desc' }, desc),
    onAction && React.createElement('button', { className: 'btn btn-primary', onClick: onAction },
      React.createElement(Svg, { icon: 'plus', size: 14 }), actionLabel
    )
  );

const Modal = ({ open, onClose, title, children, wide }) => {
  if (!open) return null;
  return React.createElement('div', {
    className: 'overlay',
    onClick: e => e.target === e.currentTarget && onClose()
  },
    React.createElement('div', { className: `modal ${wide ? 'modal-wide' : ''}` },
      React.createElement('div', { className: 'modal-header' },
        React.createElement('div', { className: 'modal-title' }, title),
        React.createElement('button', { className: 'btn-icon', onClick: onClose },
          React.createElement(Svg, { icon: 'x', size: 16 })
        )
      ),

// ─── DATA LAYER ──────────────────────────────────────────────────────────────
const DB = {
  async goals(uid) {
    const { data } = await sb.from('goals').select('*').eq('user_id', uid).order('created_at', { ascending: false });
    return data || [];
  },
  async saveGoal(uid, g, id) {
    const payload = { ...g, user_id: uid, target_value: Number(g.target_value||100), current_value: Number(g.current_value||0), deadline: g.deadline||null };
    if (id) return sb.from('goals').update(payload).eq('id', id);
    return sb.from('goals').insert(payload);
  },
  async deleteGoal(id) { return sb.from('goals').delete().eq('id', id); },
  async updateGoalProgress(id, val, status) { return sb.from('goals').update({ current_value: val, status: status||undefined, updated_at: new Date().toISOString() }).eq('id', id); },

  async tasks(uid, filter) {
    let q = sb.from('tasks').select('*, goals(title)').eq('user_id', uid).neq('status','cancelled').order('created_at', { ascending: false });
    if (filter && filter !== 'all') q = filter === 'done' ? q.eq('status','done') : q.eq('status', filter).neq('status','done');
    else if (!filter || filter === 'all') q = q.neq('status','done');
    const { data } = await q;
    return data || [];
  },
  async saveTask(uid, t, id) {
    const payload = { ...t, user_id: uid, goal_id: t.goal_id||null, due_date: t.due_date||null };
    if (id) return sb.from('tasks').update({ ...payload, updated_at: new Date().toISOString() }).eq('id', id);
    return sb.from('tasks').insert(payload);
  },
  async completeTask(id) { return sb.from('tasks').update({ status:'done', completed_at: new Date().toISOString() }).eq('id', id); },
  async moveToday(id) { return sb.from('tasks').update({ status:'today' }).eq('id', id); },
  async deleteTask(id) { return sb.from('tasks').delete().eq('id', id); },

  async categories(uid) {
    const { data } = await sb.from('categories').select('*').eq('user_id', uid).order('name');
    return data || [];
  },
  async transactions(uid, month) {
    const { data } = await sb.from('transactions').select('*, categories(name,icon,color)').eq('user_id', uid).gte('date', monthStart(month)).lte('date', monthEnd(month)).order('date', { ascending: false });
    return data || [];
  },
  async saveTx(uid, t) { return sb.from('transactions').insert({ ...t, user_id: uid, amount: Number(t.amount), category_id: t.category_id||null }); },
  async deleteTx(id) { return sb.from('transactions').delete().eq('id', id); },
  async budgets(uid, month) {
    const { data } = await sb.from('budgets').select('*, categories(name,icon,color)').eq('user_id', uid).eq('month', month);
    return data || [];
  },
  async upsertBudget(uid, catId, month, amount) { return sb.from('budgets').upsert({ user_id: uid, category_id: catId, month, amount_limit: Number(amount) }); },

  async habits(uid) {
    const { data } = await sb.from('habits').select('*, goals(title)').eq('user_id', uid).eq('active', true).order('sort_order');
    if (!data) return [];
    const { data: logs } = await sb.from('habit_logs').select('habit_id, completed').eq('user_id', uid).eq('date', today());
    const map = {};
    (logs||[]).forEach(l => { map[l.habit_id] = l.completed; });
    return data.map(h => ({ ...h, done_today: !!map[h.id] }));
  },
  async toggleHabit(uid, hid, done) {
    await sb.from('habit_logs').upsert({ habit_id: hid, user_id: uid, date: today(), completed: done });
    if (done) {
      const { data: h } = await sb.from('habits').select('current_streak,longest_streak').eq('id', hid).single();
      const s = (h?.current_streak||0) + 1;
      await sb.from('habits').update({ current_streak: s, longest_streak: Math.max(s, h?.longest_streak||0) }).eq('id', hid);
    } else {
      await sb.from('habits').update({ current_streak: 0 }).eq('id', hid);
    }
  },
  async saveHabit(uid, h, id) {
    const payload = { ...h, user_id: uid, goal_id: h.goal_id||null };
    if (id) return sb.from('habits').update(payload).eq('id', id);
    return sb.from('habits').insert(payload);
  },
  async deleteHabit(id) { return sb.from('habits').update({ active: false }).eq('id', id); },

  async notes(uid) {
    const { data } = await sb.from('notes').select('*').eq('user_id', uid).order('pinned', { ascending: false }).order('updated_at', { ascending: false });
    return data || [];
  },
  async saveNote(uid, n, id) {
    const tags = typeof n.tags === 'string' ? n.tags.split(',').map(t=>t.trim()).filter(Boolean) : (n.tags||[]);
    const payload = { ...n, tags, user_id: uid, updated_at: new Date().toISOString() };
    if (id) return sb.from('notes').update(payload).eq('id', id);
    return sb.from('notes').insert({ ...payload, created_at: new Date().toISOString() });
  },
  async deleteNote(id) { return sb.from('notes').delete().eq('id', id); },
  async pinNote(id, pinned) { return sb.from('notes').update({ pinned }).eq('id', id); },

  async brief(uid) {
    const m = thisMonth();
    const [tasks, habits, goals, txs, budgets] = await Promise.all([
      DB.tasks(uid, 'all'),
      DB.habits(uid),
      DB.goals(uid),
      DB.transactions(uid, m),
      DB.budgets(uid, m),
    ]);
    const expenses = txs.filter(t=>t.type==='expense').reduce((s,t)=>s+Number(t.amount),0);
    const income = txs.filter(t=>t.type==='income').reduce((s,t)=>s+Number(t.amount),0);
    const totalBudget = budgets.reduce((s,b)=>s+Number(b.amount_limit),0);
    const active = tasks.filter(t=>t.status!=='done');
    const focus = scoreTasks(active, goals).slice(0,3);
    const alerts = buildAlerts(active, goals, expenses, totalBudget);
    return { focus, habits, goals: goals.filter(g=>g.status==='active'), expenses, income, totalBudget, budgetPct: totalBudget>0 ? Math.round(expenses/totalBudget*100) : null, alerts };
  }
};

function scoreTasks(tasks, goals) {
  const gmap = {}; goals.forEach(g=>{ gmap[g.id]=g; });
  const now = new Date();
  return [...tasks].sort((a,b) => {
    let sa=0, sb=0;
    const score = (t) => {
      let s=0;
      if (t.due_date) { const d=Math.ceil((new Date(t.due_date)-now)/86400000); if(d<=0)s+=100; else if(d<=1)s+=60; else if(d<=3)s+=30; }
      s += {critical:50,high:25,low:5,none:0}[t.priority]||0;
      if (t.goal_id && gmap[t.goal_id]) { s+=20; if(gmap[t.goal_id].deadline && Math.ceil((new Date(gmap[t.goal_id].deadline)-now)/86400000)<=14) s+=15; }
      if (t.status==='today') s+=40;
      return s;
    };
    return score(b)-score(a);
  });
}

function buildAlerts(tasks, goals, expenses, totalBudget) {
  const all = [];
  if (totalBudget>0 && expenses/totalBudget>0.9) all.push({ type:'gold', msg:`Has usado el ${Math.round(expenses/totalBudget*100)}% del presupuesto mensual.` });
  const overdue = tasks.filter(t=>t.due_date && new Date(t.due_date)<new Date());
  if (overdue.length) all.push({ type:'red', msg:`Tienes ${overdue.length} tarea${overdue.length>1?'s':''} vencida${overdue.length>1?'s':''}.` });
  const overdueGoals = goals.filter(g=>g.deadline && new Date(g.deadline)<new Date() && g.status==='active');
  if (overdueGoals.length) all.push({ type:'red', msg:`"${overdueGoals[0].title}" ha superado su fecha límite.` });
  return all.slice(0,1);
}

// ─── NOTAS PAGE ───────────────────────────────────────────────────────────────
const PageNotas = () => {
  const { user, refresh, setRefresh } = useApp();
  const [notes, setNotes] = useState(null);
  const [search, setSearch] = useState('');
  const [modal, setModal] = useState(false);
  const [editing, setEditing] = useState(null);
  const [form, setForm] = useState({title:'',content:'',pinned:false,tags:''});

  useEffect(()=>{ load(); },[refresh]);
  const load = async () => { setNotes(await DB.notes(user.id)); };
  const openNew = () => { setEditing(null); setForm({title:'',content:'',pinned:false,tags:''}); setModal(true); };
  const openEdit = (n) => { setEditing(n); setForm({title:n.title,content:n.content||'',pinned:n.pinned,tags:(n.tags||[]).join(', ')}); setModal(true); };
  const save = async () => { if(!form.title.trim())return; await DB.saveNote(user.id,form,editing?.id); setModal(false); setRefresh(r=>r+1); };
  const del = async (id) => { if(confirm('¿Eliminar nota?')){ await DB.deleteNote(id); setRefresh(r=>r+1); } };
  const pin = async (n) => { await DB.pinNote(n.id, !n.pinned); setRefresh(r=>r+1); };

  const filtered = (notes||[]).filter(n=>!search||(n.title+n.content).toLowerCase().includes(search.toLowerCase()));
  const pinned = filtered.filter(n=>n.pinned);
  const rest = filtered.filter(n=>!n.pinned);

  return React.createElement('div',{className:'fade'},
    React.createElement('div',{className:'page-header'},
      React.createElement('div',null,
        React.createElement('div',{className:'label'},'Módulo'),
        React.createElement('h1',{className:'page-title'},'Notas')

    React.createElement('div',{style:{position:'relative',marginBottom:18}},
      React.createElement(Svg,{icon:'search',size:15,color:'var(--dim)',style:{position:'absolute',left:12,top:'50%',transform:'translateY(-50%)'}}),
      React.createElement('input',{className:'input',style:{paddingLeft:36},value:search,onChange:e=>setSearch(e.target.value),placeholder:'Buscar notas...'})
    ),
    !notes ? React.createElement(Spinner) :
    !filtered.length ? React.createElement(Empty,{icon:'📝',title:search?'Sin resultados':'Sin notas',desc:search?'Prueba otra búsqueda':'Captura ideas, referencias y contexto',onAction:!search?openNew:undefined,actionLabel:'Primera nota'}) :
    React.createElement('div',null,
      pinned.length>0&&React.createElement('div',{style:{marginBottom:20}},
        React.createElement('div',{className:'label',style:{marginBottom:10}},'📌 Fijadas'),
        React.createElement('div',{className:'notes-grid'},
          pinned.map(n=>React.createElement(NoteCard,{key:n.id,note:n,onEdit:()=>openEdit(n),onDelete:()=>del(n.id),onPin:()=>pin(n)}))
        )
      ),
      rest.length>0&&React.createElement('div',null,
        pinned.length>0&&React.createElement('div',{className:'label',style:{marginBottom:10}},'Todas las notas'),
        React.createElement('div',{className:'notes-grid'},
          rest.map(n=>React.createElement(NoteCard,{key:n.id,note:n,onEdit:()=>openEdit(n),onDelete:()=>del(n.id),onPin:()=>pin(n)}))
        )
      )
    ),
    React.createElement(Modal,{open:modal,onClose:()=>setModal(false),title:editing?'Editar nota':'Nueva nota',wide:true},
      React.createElement('div',{style:{display:'flex',flexDirection:'column',gap:14}},
        React.createElement(FG,{label:'Título *'},React.createElement('input',{className:'input',value:form.title,onChange:e=>setForm(f=>({...f,title:e.target.value})),placeholder:'Título...',autoFocus:true})),
        React.createElement(FG,{label:'Contenido'},React.createElement('textarea',{className:'input',value:form.content,onChange:e=>setForm(f=>({...f,content:e.target.value})),placeholder:'Escribe aquí...',rows:7})),

        React.createElement('label',{style:{display:'flex',alignItems:'center',gap:8,cursor:'pointer',fontSize:14,color:'var(--muted)'}},

// ─── QUICK CAPTURE ────────────────────────────────────────────────────────────
const QuickCapture = ({ open, onClose }) => {
  const { user, setRefresh } = useApp();
  const [text, setText] = useState('');
  const [type, setType] = useState('task');
  const [amount, setAmount] = useState('');
  const [catId, setCatId] = useState('');
  const [cats, setCats] = useState([]);
  const [saving, setSaving] = useState(false);

  useEffect(()=>{ if(open) DB.categories(user.id).then(setCats); },[open]);

  const save = async () => {
    if (!text.trim()) return;
    setSaving(true);
    try {
      if (type==='task') await DB.saveTask(user.id, {title:text.trim(),status:'inbox',priority:'none',energy_cost:'medium'});
      else if (type==='expense'||type==='income') {
        const amt = parseFloat((amount||text).replace(/[^0-9.,]/g,'').replace(',','.'));
        if(isNaN(amt)) throw new Error('Importe inválido');
        await DB.saveTx(user.id, {description:text.trim(),amount:amt,type,category_id:catId||null,date:today()});
      } else await DB.saveNote(user.id, {title:text.trim().slice(0,80),content:text.trim(),pinned:false,tags:[]});
      setRefresh(r=>r+1);
      setText(''); setAmount(''); setCatId('');
      onClose();
    } catch(e) { alert(e.message); }
    setSaving(false);
  };

  const expCats = cats.filter(c=>c.type!=='income');
  const incCats = cats.filter(c=>c.type!=='expense');

  return React.createElement(Modal,{open,onClose,title:'Captura rápida'},
    React.createElement('div',{style:{display:'flex',flexDirection:'column',gap:14}},
      React.createElement('div',{style:{display:'flex',gap:5}},
        [{v:'task',l:'✅ Tarea'},{v:'expense',l:'💸 Gasto'},{v:'income',l:'💰 Ingreso'},{v:'note',l:'📝 Nota'}].map(({v,l})=>
          React.createElement('button',{key:v,onClick:()=>setType(v),style:{flex:1,padding:'7px 2px',fontSize:11,fontWeight:600,borderRadius:'var(--rs)',border:`1px solid ${type===v?'var(--accent)':'var(--border)'}`,background:type===v?'var(--accent-lo)':'var(--surface2)',color:type===v?'var(--accent)':'var(--muted)',cursor:'pointer',fontFamily:'var(--font)'}},l)
        )
      ),
      React.createElement('input',{className:'input',value:text,onChange:e=>setText(e.target.value),onKeyDown:e=>e.key==='Enter'&&save(),placeholder:{task:'¿Qué tienes que hacer?',expense:'Descripción del gasto...',income:'Descripción del ingreso...',note:'Título o contenido...'}[type],autoFocus:true}),
      (type==='expense'||type==='income')&&React.createElement('div',{className:'grid-2'},
        React.createElement(FG,{label:'Importe (€)'},React.createElement('input',{type:'number',className:'input',value:amount,onChange:e=>setAmount(e.target.value),placeholder:'0.00'})),
        React.createElement(FG,{label:'Categoría'},
          React.createElement('select',{className:'input',value:catId,onChange:e=>setCatId(e.target.value)},
            React.createElement('option',{value:''},'Sin categoría'),
            (type==='expense'?expCats:incCats).map(c=>React.createElement('option',{key:c.id,value:c.id},c.icon+' '+c.name))
          )
        )
      ),
      React.createElement('div',{className:'modal-footer'},
        React.createElement('button',{className:'btn btn-ghost',onClick:onClose},'Cancelar'),
        React.createElement('button',{className:'btn btn-primary',onClick:save,disabled:saving},
          saving?'Guardando...':React.createElement('span',{style:{display:'flex',alignItems:'center',gap:6}},React.createElement(Svg,{icon:'zap',size:14}),'Guardar')
        )
      )
    )
  );
};

// ─── AUTH PAGE ────────────────────────────────────────────────────────────────
const AuthPage = ({ onAuth }) => {
  const [mode, setMode] = useState('login');
  const [email, setEmail] = useState('');
  const [pass, setPass] = useState('');
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');
  const [msg, setMsg] = useState('');

  const submit = async (e) => {
    e.preventDefault();
    setLoading(true); setError(''); setMsg('');
    try {
      if (mode==='signup') {
        const { error } = await sb.auth.signUp({email, password:pass});
        if(error) throw error;
        setMsg('Revisa tu email para confirmar tu cuenta.');
      } else {
        const { data, error } = await sb.auth.signInWithPassword({email, password:pass});
        if(error) throw error;
        onAuth(data.user);
      }
    } catch(e) { setError(e.message); }
    setLoading(false);
  };

  return React.createElement('div',{className:'auth-wrap'},
    React.createElement('div',{className:'auth-bg'}),
    React.createElement('div',{className:'auth-box'},
      React.createElement('div',{className:'auth-logo'},
        React.createElement('div',{className:'auth-logo-icon'},'⚡'),
        React.createElement('h1',{style:{fontSize:28,fontWeight:800,letterSpacing:'-0.02em'}},'LifeOS'),
        React.createElement('p',{style:{color:'var(--muted)',fontSize:14,marginTop:5}},'Tu sistema operativo personal')
      ),
      React.createElement('div',{className:'auth-card'},
        React.createElement('h2',{style:{fontSize:18,fontWeight:700,marginBottom:20}},mode==='login'?'Acceder':'Crear cuenta'),
        React.createElement('form',{className:'auth-form',onSubmit:submit},
          React.createElement(FG,{label:'Email'},
            React.createElement('input',{type:'email',className:'input',value:email,onChange:e=>setEmail(e.target.value),placeholder:'tu@email.com',required:true,autoComplete:'email'})
          ),
          React.createElement(FG,{label:'Contraseña'},
            React.createElement('input',{type:'password',className:'input',value:pass,onChange:e=>setPass(e.target.value),placeholder:'••••••••',required:true})
          ),
          error&&React.createElement('div',{className:'alert alert-red',style:{margin:0}},error),
          msg&&React.createElement('div',{className:'alert alert-green',style:{margin:0}},msg),
          React.createElement('button',{type:'submit',className:'btn btn-primary',style:{width:'100%',justifyContent:'center'},disabled:loading},
            loading?'Cargando...':mode==='login'?'Entrar':'Crear cuenta'
          )
        ),
        React.createElement('div',{style:{marginTop:20,textAlign:'center',borderTop:'1px solid var(--border)',paddingTop:18}},
          React.createElement('button',{className:'btn btn-ghost',onClick:()=>{setMode(m=>m==='login'?'signup':'login');setError('');setMsg('');},style:{fontSize:13}},
            mode==='login'?'¿Sin cuenta? Regístrate':'¿Ya tienes cuenta? Accede'
          )
        )
      ),
      React.createElement('p',{style:{textAlign:'center',marginTop:16,color:'var(--dim)',fontSize:11,fontFamily:'var(--mono)'}},'Tus datos viven solo en tu Supabase.')
    )
  );
};

  { id:'tareas', icon:'check', label:'Tareas' },

const AppLayout = ({ user, signOut }) => {
  const [page, setPage] = useState('hoy');

  const [capture, setCapture] = useState(false);

  const ctx = { user, refresh, setRefresh };

  const PAGES = { hoy: PageHoy, tareas: PageTareas, finanzas: PageFinanzas, metas: PageMetas, notas: PageNotas };

  // Keyboard shortcut
  useEffect(() => {
    const handler = (e) => { if(e.key===' '&&e.target===document.body){ e.preventDefault(); setCapture(true); } };

    return () => window.removeEventListener('keydown', handler);

  return React.createElement(AppCtx.Provider, { value: ctx },

// ─── ROOT APP ─────────────────────────────────────────────────────────────────
const App = () => {
  const [user, setUser] = useState(undefined); // undefined = loading
  const notConfigured = SUPABASE_URL.includes('TU_PROYECTO') || !sb;

  useEffect(() => {
    if (notConfigured) { setUser(null); return; }
    sb.auth.getSession().then(({ data }) => setUser(data.session?.user || null));
    const { data: { subscription } } = sb.auth.onAuthStateChange((_, session) => setUser(session?.user || null));
    return () => subscription.unsubscribe();
  }, []);

  if (user === undefined) return React.createElement('div',{className:'loading-screen'},
    React.createElement('div',{className:'spinner'}),
    React.createElement('span',{style:{color:'var(--muted)',fontSize:13,fontFamily:'var(--mono)'}},'Cargando...')
  );

  if (notConfigured) return React.createElement(ConfigScreen);
  if (!user) return React.createElement(AuthPage, { onAuth: setUser });
  return React.createElement(AppLayout, { user, signOut: ()=>sb.auth.signOut().then(()=>setUser(null)) });
};

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
